document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Sweed — All Pages<\u002Ftitle>\n\n<style>/* =========================================================\n   SWEED DESIGN SYSTEM — Colors & Typography\n   Primary surface: light admin/POS UI\n   Fonts: DM Sans Bold (headings) + Nunito Sans (everything else)\n   Both loaded from local brand TTFs.\n   ========================================================= */\n\n/* Paths resolve from both /preview/* cards and the Design System root */\n@font-face {\n  font-family: \"DM Sans\";\n  src: url(\"5f96f875-c7b1-4c92-9284-087068a92b41\") format(\"truetype-variations\"),\n       url(\"5f96f875-c7b1-4c92-9284-087068a92b41\") format(\"truetype\");\n  font-weight: 100 1000;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Nunito Sans\";\n  src: url(\"94bb3876-d215-4a4e-b012-1be9b708b4e5\") format(\"truetype-variations\"),\n       url(\"94bb3876-d215-4a4e-b012-1be9b708b4e5\") format(\"truetype\");\n  font-weight: 200 1000;\n  font-style: normal;\n  font-display: swap;\n}\n\n:root {\n  /* ---------- BRAND CORE ---------- */\n  --sweed-teal:        #1D7874;   /* primary wordmark ink */\n  --sweed-teal-dark:   #0F4C4A;\n  --sweed-teal-600:    #1D7874;\n  --sweed-teal-500:    #2A918D;\n  --sweed-teal-400:    #54C8D4;   /* secondary accent / \"S\" in logo */\n  --sweed-teal-100:    #D6F1F3;\n  --sweed-teal-50:     #EDF8F9;\n\n  --sweed-orange:      #FC702A;   /* accent — \"E\" in logo */\n  --sweed-orange-600:  #E25A15;\n  --sweed-orange-100:  #FFE0CE;\n\n  --sweed-yellow:      #FEBF00;   /* accent — \"E\" in logo */\n  --sweed-yellow-600:  #D6A000;\n  --sweed-yellow-100:  #FFF1C2;\n\n  --sweed-cyan:        #00B2D6;   /* info / data blue */\n  --sweed-cyan-100:    #CDEFF8;\n\n  --sweed-green:       #5FBB74;   /* success / healthy */\n  --sweed-green-600:   #3E9956;\n  --sweed-green-100:   #D7EFDD;\n\n  --sweed-red:         #EC2355;   /* danger / compliance alert */\n  --sweed-red-600:     #C81641;\n  --sweed-red-100:     #FBD4DF;\n\n  --sweed-ink:         #131313;   /* near-black from palette */\n  --sweed-ink-soft:    #1F1F1F;\n\n  /* ---------- NEUTRAL RAMP (from palette) ---------- */\n  --sweed-gray-900:    #131313;\n  --sweed-gray-800:    #2A2A2A;\n  --sweed-gray-700:    #4A4A4A;\n  --sweed-gray-600:    #6E6E6E;\n  --sweed-gray-500:    #B6B6B6;\n  --sweed-gray-400:    #D0D0D0;\n  --sweed-gray-300:    #E3E3E3;\n  --sweed-gray-200:    #EBEBEB;\n  --sweed-gray-100:    #F2F2F2;\n  --sweed-gray-50:     #F7F7F7;\n  --sweed-white:       #FFFFFF;\n\n  /* ---------- SEMANTIC — FOREGROUND / BACKGROUND ---------- */\n  --fg-1:              var(--sweed-gray-900);   /* body text */\n  --fg-2:              var(--sweed-gray-700);   /* secondary text */\n  --fg-3:              var(--sweed-gray-600);   /* muted / help text */\n  --fg-4:              var(--sweed-gray-500);   /* disabled */\n  --fg-on-teal:        var(--sweed-white);\n  --fg-link:           var(--sweed-teal-600);\n\n  --bg-page:           var(--sweed-white);\n  --bg-surface:        var(--sweed-white);\n  --bg-muted:          var(--sweed-gray-50);\n  --bg-inset:          var(--sweed-gray-100);\n  --bg-hover:          var(--sweed-gray-100);\n  --bg-selected:       var(--sweed-teal-50);\n  --bg-dark:           var(--sweed-gray-900);\n\n  /* ---------- SEMANTIC — STATE ---------- */\n  --accent:            var(--sweed-teal);\n  --accent-hover:      var(--sweed-teal-dark);\n  --accent-soft:       var(--sweed-teal-50);\n\n  --success:           var(--sweed-green);\n  --success-soft:      var(--sweed-green-100);\n  --warning:           var(--sweed-yellow);\n  --warning-soft:      var(--sweed-yellow-100);\n  --danger:            var(--sweed-red);\n  --danger-soft:       var(--sweed-red-100);\n  --info:              var(--sweed-cyan);\n  --info-soft:         var(--sweed-cyan-100);\n\n  /* ---------- BORDERS ---------- */\n  --border-1:          var(--sweed-gray-200);   /* hairline */\n  --border-2:          var(--sweed-gray-300);   /* standard */\n  --border-3:          var(--sweed-gray-400);   /* emphasis */\n  --border-focus:      var(--sweed-teal-400);\n\n  /* ---------- RADII ---------- */\n  --radius-xs:         4px;\n  --radius-sm:         6px;\n  --radius-md:         8px;    /* buttons, inputs */\n  --radius-lg:         12px;   /* cards */\n  --radius-xl:         16px;   /* large cards, modals */\n  --radius-2xl:        24px;   /* hero / marketing panels */\n  --radius-pill:       999px;\n\n  /* ---------- SHADOWS ---------- */\n  --shadow-xs:         0 1px 2px rgba(19, 19, 19, 0.05);\n  --shadow-sm:         0 2px 4px rgba(19, 19, 19, 0.06), 0 1px 2px rgba(19, 19, 19, 0.04);\n  --shadow-md:         0 4px 12px rgba(19, 19, 19, 0.08);\n  --shadow-lg:         0 12px 32px rgba(19, 19, 19, 0.10);\n  --shadow-xl:         0 24px 56px rgba(19, 19, 19, 0.14);\n  --shadow-focus:      0 0 0 3px rgba(84, 200, 212, 0.30);\n  --shadow-inner:      inset 0 1px 2px rgba(19, 19, 19, 0.06);\n\n  /* ---------- SPACING (4px base) ---------- */\n  --space-0:           0;\n  --space-1:           4px;\n  --space-2:           8px;\n  --space-3:           12px;\n  --space-4:           16px;\n  --space-5:           20px;\n  --space-6:           24px;\n  --space-8:           32px;\n  --space-10:          40px;\n  --space-12:          48px;\n  --space-16:          64px;\n  --space-20:          80px;\n  --space-24:          96px;\n\n  /* ---------- TYPOGRAPHY ---------- */\n  --font-ui:           \"Nunito Sans\", ui-sans-serif, system-ui, -apple-system, sans-serif;\n  --font-display:      \"DM Sans\", \"Nunito Sans\", ui-sans-serif, system-ui, sans-serif;\n  --font-mono:         \"Nunito Sans\", ui-sans-serif, system-ui, sans-serif; /* mono role folded into Nunito per brand rule: only 2 families */\n\n  /* Display scale — marketing site headers */\n  --display-1-size:    72px;  --display-1-lh: 1.04;  --display-1-wt: 700;  --display-1-tr: -0.02em;\n  --display-2-size:    56px;  --display-2-lh: 1.06;  --display-2-wt: 700;  --display-2-tr: -0.02em;\n  --display-3-size:    44px;  --display-3-lh: 1.10;  --display-3-wt: 700;  --display-3-tr: -0.015em;\n\n  /* Heading scale — product UI */\n  --h1-size:           32px;  --h1-lh: 1.20;  --h1-wt: 700;  --h1-tr: -0.01em;\n  --h2-size:           24px;  --h2-lh: 1.25;  --h2-wt: 700;  --h2-tr: -0.005em;\n  --h3-size:           20px;  --h3-lh: 1.30;  --h3-wt: 700;  --h3-tr:  0;\n  --h4-size:           16px;  --h4-lh: 1.35;  --h4-wt: 700;  --h4-tr:  0;\n  --h5-size:           14px;  --h5-lh: 1.40;  --h5-wt: 700;  --h5-tr:  0.01em;\n\n  /* Body */\n  --body-lg-size:      18px;  --body-lg-lh: 1.55;\n  --body-size:         15px;  --body-lh:    1.55;\n  --body-sm-size:      13px;  --body-sm-lh: 1.50;\n  --caption-size:      12px;  --caption-lh: 1.40;\n  --overline-size:     11px;  --overline-lh: 1.30;  --overline-ls: 0.08em;\n}\n\n/* ====================  SEMANTIC ELEMENT STYLES  ==================== */\n\nhtml, body {\n  background: var(--bg-page);\n  color: var(--fg-1);\n  font-family: var(--font-ui);\n  font-size: var(--body-size);\n  line-height: var(--body-lh);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, .h1 {\n  font-family: var(--font-display);\n  font-size: var(--h1-size); line-height: var(--h1-lh);\n  font-weight: var(--h1-wt); letter-spacing: var(--h1-tr);\n  color: var(--fg-1); margin: 0;\n}\nh2, .h2 {\n  font-family: var(--font-display);\n  font-size: var(--h2-size); line-height: var(--h2-lh);\n  font-weight: var(--h2-wt); letter-spacing: var(--h2-tr);\n  color: var(--fg-1); margin: 0;\n}\nh3, .h3 {\n  font-family: var(--font-display);\n  font-size: var(--h3-size); line-height: var(--h3-lh);\n  font-weight: var(--h3-wt); color: var(--fg-1); margin: 0;\n}\nh4, .h4 {\n  font-family: var(--font-display);\n  font-size: var(--h4-size); line-height: var(--h4-lh);\n  font-weight: var(--h4-wt); color: var(--fg-1); margin: 0;\n}\nh5, .h5 {\n  font-family: var(--font-display);\n  font-size: var(--h5-size); line-height: var(--h5-lh);\n  font-weight: var(--h5-wt); color: var(--fg-1); margin: 0;\n}\n\np  { font-size: var(--body-size); line-height: var(--body-lh); color: var(--fg-1); margin: 0; }\n.body-lg { font-size: var(--body-lg-size); line-height: var(--body-lg-lh); }\n.body-sm { font-size: var(--body-sm-size); line-height: var(--body-sm-lh); color: var(--fg-2); }\n.caption { font-size: var(--caption-size); line-height: var(--caption-lh); color: var(--fg-3); }\n.overline {\n  font-size: var(--overline-size); line-height: var(--overline-lh);\n  letter-spacing: var(--overline-ls); text-transform: uppercase;\n  font-weight: 700; color: var(--fg-3);\n}\ncode, kbd, pre, .mono {\n  font-family: var(--font-ui);\n  font-weight: 600;\n  font-size: 0.92em;\n}\n\na { color: var(--fg-link); text-decoration: none; }\na:hover { text-decoration: underline; }\n\nhr { border: 0; border-top: 1px solid var(--border-1); margin: var(--space-6) 0; }\n\n::selection { background: var(--sweed-teal-100); color: var(--sweed-teal-dark); }\n<\u002Fstyle>\n<style>/* =========================================================\n   BACK-TO-INDEX BUTTON (shared across all 3 pages)\n   ========================================================= */\n.lp-back {\n  position: fixed;\n  top: 20px;\n  left: 20px;\n  z-index: 200;\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 10px 16px 10px 12px;\n  background: #fff;\n  border: 1px solid var(--lp-border);\n  border-radius: 999px;\n  color: var(--lp-fg-primary);\n  font-family: var(--font-ui);\n  font-size: 13px;\n  font-weight: 700;\n  text-decoration: none;\n  box-shadow: 0 8px 24px -10px rgba(14, 21, 19, 0.18);\n  transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;\n}\n.lp-back:hover {\n  transform: translateX(-2px);\n  background: var(--lp-bg-soft);\n  box-shadow: 0 12px 28px -10px rgba(14, 21, 19, 0.24);\n  text-decoration: none;\n  color: var(--lp-fg-primary);\n}\n.lp-back svg {\n  transition: transform 200ms ease;\n}\n.lp-back:hover svg { transform: translateX(-3px); }\n\n/* Inline back-banner placed inside section headers — bigger, more visible */\n.lp-back-banner {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 12px 20px 12px 16px;\n  background: var(--lp-bg-ink);\n  color: #fff;\n  border-radius: 999px;\n  font-family: var(--font-ui);\n  font-size: 14px;\n  font-weight: 700;\n  text-decoration: none;\n  margin-bottom: 24px;\n  transition: transform 180ms ease, background 180ms ease;\n}\n.lp-back-banner:hover {\n  transform: translateX(-3px);\n  background: #1B2624;\n  color: #fff;\n  text-decoration: none;\n}\n.lp-back-banner svg { transition: transform 200ms ease; }\n.lp-back-banner:hover svg { transform: translateX(-4px); }\n\n/* In-section anchor back link — appears at the bottom of every Components section */\n.lp-back-inline {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  margin-top: 28px;\n  padding: 8px 14px 8px 10px;\n  border-radius: 999px;\n  font-size: 12px;\n  font-weight: 700;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n  color: var(--lp-fg-muted);\n  background: var(--lp-bg-sunken);\n  text-decoration: none;\n  transition: color 160ms, background 160ms;\n}\n.lp-back-inline:hover {\n  color: var(--sweed-teal);\n  background: var(--sweed-teal-50);\n  text-decoration: none;\n}\n\n/* =========================================================\n   SWEED LANDINGS — extends colors_and_type.css with\n   landing-page-specific tokens, atoms, molecules.\n   Premium (\"Revolut\"), constructor (\"Notion\") philosophy.\n   ========================================================= */\n\n:root {\n  /* Landing-specific surface tokens (on top of Sweed base) */\n  --lp-bg:            #FFFFFF;\n  --lp-bg-soft:       #FAFAF9;      /* warm off-white — page background */\n  --lp-bg-raised:     #FFFFFF;\n  --lp-bg-sunken:     #F3F3F2;\n  --lp-bg-ink:        #0E1513;      /* deep teal-black — hero / dark sections */\n  --lp-bg-ink-2:      #122520;\n\n  --lp-fg-primary:    #0E1513;\n  --lp-fg-secondary:  #4A5553;\n  --lp-fg-muted:      #7A8380;\n  --lp-fg-on-ink:     #FFFFFF;\n  --lp-fg-on-ink-2:   rgba(255,255,255,0.68);\n  --lp-fg-on-ink-3:   rgba(255,255,255,0.42);\n\n  --lp-border:        #E7E5E2;\n  --lp-border-strong: #D9D6D1;\n  --lp-border-on-ink: rgba(255,255,255,0.10);\n\n  /* Landing radii */\n  --lp-r-input:  10px;\n  --lp-r-btn:    12px;\n  --lp-r-tag:    8px;\n  --lp-r-card:   16px;\n  --lp-r-media:  20px;\n  --lp-r-hero:   28px;\n\n  /* Section paddings */\n  --lp-section-y:   112px;\n  --lp-section-y-sm: 72px;\n  --lp-container:   1280px;\n  --lp-container-narrow: 960px;\n\n  /* Status colors tuned for landing (brand green for LIVE) */\n  --lp-live:        #1F9D55;\n  --lp-live-soft:   #E5F4EB;\n  --lp-soon:        rgba(31, 157, 85, 0.55);\n  --lp-soon-bg:     rgba(31, 157, 85, 0.10);\n  --lp-highlight:   var(--sweed-orange);\n  --lp-highlight-soft: var(--sweed-orange-100);\n}\n\nhtml, body { background: var(--lp-bg-soft); color: var(--lp-fg-primary); }\n\n/* Any body .lp-page class forces warm off-white background */\nbody.lp-page { background: var(--lp-bg-soft); }\n\n/* ==================================================\n   TYPE — landing-specific heading rhythm\n   ================================================== */\n.lp-eyebrow {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-family: var(--font-ui);\n  font-size: 12px; font-weight: 700;\n  letter-spacing: 0.08em; text-transform: uppercase;\n  color: var(--sweed-teal);\n}\n.lp-eyebrow::before {\n  content: \"\"; width: 18px; height: 1px; background: currentColor; opacity: 0.5;\n}\n.lp-eyebrow.no-rule::before { display: none; }\n\n.lp-display {\n  font-family: var(--font-display);\n  font-size: clamp(44px, 5.6vw, 76px); line-height: 1.02;\n  font-weight: 700; letter-spacing: -0.025em;\n  color: var(--lp-fg-primary);\n}\n.lp-h1 {\n  font-family: var(--font-display);\n  font-size: clamp(36px, 4vw, 52px); line-height: 1.08;\n  font-weight: 700; letter-spacing: -0.02em;\n}\n.lp-h2 {\n  font-family: var(--font-display);\n  font-size: clamp(28px, 2.8vw, 40px); line-height: 1.12;\n  font-weight: 700; letter-spacing: -0.015em;\n}\n.lp-h3 {\n  font-family: var(--font-display);\n  font-size: 24px; line-height: 1.2;\n  font-weight: 700; letter-spacing: -0.005em;\n}\n.lp-h4 {\n  font-family: var(--font-display);\n  font-size: 18px; line-height: 1.3;\n  font-weight: 700;\n}\n.lp-lead {\n  font-family: var(--font-ui);\n  font-size: 19px; line-height: 1.55;\n  color: var(--lp-fg-secondary);\n  max-width: 56ch;\n}\n.lp-body { font-size: 15px; line-height: 1.6; color: var(--lp-fg-secondary); }\n.lp-small { font-size: 13px; line-height: 1.5; color: var(--lp-fg-muted); }\n\n/* ==================================================\n   LAYOUT\n   ================================================== */\n.lp-section { padding: var(--lp-section-y) 32px; }\n.lp-section.tight { padding: var(--lp-section-y-sm) 32px; }\n.lp-section.ink  { background: var(--lp-bg-ink); color: var(--lp-fg-on-ink); }\n.lp-section.ink .lp-display,\n.lp-section.ink .lp-h1,\n.lp-section.ink .lp-h2,\n.lp-section.ink .lp-h3,\n.lp-section.ink .lp-h4 { color: var(--lp-fg-on-ink); }\n.lp-section.ink .lp-lead,\n.lp-section.ink .lp-body { color: var(--lp-fg-on-ink-2); }\n.lp-section.ink .lp-small { color: var(--lp-fg-on-ink-3); }\n.lp-section.sunken { background: var(--lp-bg-sunken); }\n\n.lp-container { max-width: var(--lp-container); margin: 0 auto; }\n.lp-container.narrow { max-width: var(--lp-container-narrow); }\n\n/* ==================================================\n   ATOMS — Button\n   ================================================== */\n.lp-btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n  font-family: var(--font-ui);\n  font-weight: 600; font-size: 15px;\n  border-radius: var(--lp-r-btn);\n  padding: 14px 22px;\n  border: 1px solid transparent;\n  cursor: pointer;\n  transition: transform 160ms ease-out, background 160ms ease-out, color 160ms ease-out, border-color 160ms ease-out, box-shadow 160ms ease-out;\n  text-decoration: none;\n  white-space: nowrap;\n  line-height: 1;\n}\n.lp-btn:hover { text-decoration: none; }\n.lp-btn:active { transform: translateY(1px); }\n.lp-btn.sm { padding: 10px 16px; font-size: 14px; border-radius: 10px; }\n.lp-btn.lg { padding: 18px 28px; font-size: 16px; }\n\n.lp-btn--primary { background: var(--lp-fg-primary); color: #fff; }\n.lp-btn--primary:hover { background: #1d2a26; }\n.lp-btn--accent { background: var(--sweed-teal); color: #fff; }\n.lp-btn--accent:hover { background: var(--sweed-teal-dark); }\n.lp-btn--secondary { background: #fff; color: var(--lp-fg-primary); border-color: var(--lp-border-strong); }\n.lp-btn--secondary:hover { background: var(--lp-bg-sunken); }\n.lp-btn--ghost { background: transparent; color: var(--lp-fg-primary); }\n.lp-btn--ghost:hover { background: var(--lp-bg-sunken); }\n.lp-btn--on-ink { background: #fff; color: var(--lp-fg-primary); }\n.lp-btn--on-ink:hover { background: #f3f3f2; }\n.lp-btn--ghost-on-ink { background: transparent; color: #fff; border-color: var(--lp-border-on-ink); }\n.lp-btn--ghost-on-ink:hover { background: rgba(255,255,255,0.06); }\n\n/* Text link */\n.lp-link {\n  display: inline-flex; align-items: center; gap: 6px;\n  font-weight: 600; color: var(--lp-fg-primary);\n  text-decoration: none;\n  padding: 4px 0;\n  border-bottom: 1px solid var(--lp-border-strong);\n  transition: border-color 160ms ease-out, color 160ms ease-out;\n}\n.lp-link:hover { border-color: var(--lp-fg-primary); text-decoration: none; }\n.lp-link--subtle { color: var(--lp-fg-secondary); border-color: transparent; }\n.lp-link--subtle:hover { color: var(--lp-fg-primary); }\n\n/* ==================================================\n   ATOMS — Input / Form\n   ================================================== */\n.lp-input {\n  font-family: var(--font-ui);\n  font-size: 15px;\n  padding: 14px 16px;\n  border-radius: var(--lp-r-input);\n  border: 1px solid var(--lp-border-strong);\n  background: #fff; color: var(--lp-fg-primary);\n  transition: border-color 160ms, box-shadow 160ms;\n  width: 100%;\n  outline: none;\n}\n.lp-input::placeholder { color: var(--lp-fg-muted); }\n.lp-input:focus { border-color: var(--sweed-teal); box-shadow: 0 0 0 3px rgba(29,120,116,0.15); }\n\n/* Inline hero form: input + button attached */\n.lp-inline-form {\n  display: flex;\n  background: #fff;\n  border: 1px solid var(--lp-border-strong);\n  border-radius: var(--lp-r-btn);\n  padding: 6px;\n  gap: 6px;\n  max-width: 440px;\n  transition: border-color 160ms, box-shadow 160ms;\n}\n.lp-inline-form:focus-within { border-color: var(--sweed-teal); box-shadow: 0 0 0 3px rgba(29,120,116,0.12); }\n.lp-inline-form input {\n  flex: 1; border: 0; outline: 0; padding: 10px 12px;\n  font-family: var(--font-ui); font-size: 15px; background: transparent; color: var(--lp-fg-primary);\n}\n.lp-inline-form input::placeholder { color: var(--lp-fg-muted); }\n.lp-inline-form .lp-btn { padding: 12px 18px; }\n\n/* Compact waitlist form — used inside SOON cards */\n.lp-waitlist {\n  display: flex; gap: 6px;\n  background: var(--lp-bg-sunken);\n  border: 1px solid var(--lp-border);\n  border-radius: 10px;\n  padding: 4px;\n  transition: border-color 160ms, background 160ms;\n}\n.lp-waitlist:focus-within { border-color: var(--sweed-teal); background: #fff; }\n.lp-waitlist input {\n  flex: 1; border: 0; outline: 0; padding: 8px 10px;\n  font-family: var(--font-ui); font-size: 13px; background: transparent;\n}\n.lp-waitlist input::placeholder { color: var(--lp-fg-muted); }\n.lp-waitlist button {\n  border: 0; cursor: pointer;\n  background: var(--lp-fg-primary); color: #fff;\n  padding: 8px 14px; border-radius: 8px;\n  font-family: var(--font-ui); font-weight: 600; font-size: 13px;\n  transition: background 160ms;\n}\n.lp-waitlist button:hover { background: #1d2a26; }\n\n/* ==================================================\n   ATOMS — Tag / Badge / Chip\n   ================================================== */\n.lp-tag {\n  display: inline-flex; align-items: center; gap: 6px;\n  font-family: var(--font-ui); font-size: 11px; font-weight: 700;\n  letter-spacing: 0.1em; text-transform: uppercase;\n  padding: 5px 10px;\n  border-radius: var(--lp-r-tag);\n  line-height: 1;\n}\n.lp-tag--live {\n  background: var(--lp-live);\n  color: #fff;\n}\n.lp-tag--live::before {\n  content: \"\"; width: 6px; height: 6px; border-radius: 50%;\n  background: #fff;\n  box-shadow: 0 0 0 3px rgba(255,255,255,0.3);\n}\n.lp-tag--soon {\n  background: var(--lp-soon-bg);\n  color: var(--lp-live);\n  border: 1px solid rgba(31,157,85,0.25);\n}\n.lp-tag--highlight {\n  background: var(--lp-highlight-soft);\n  color: var(--sweed-orange-600);\n}\n.lp-tag--neutral {\n  background: var(--lp-bg-sunken);\n  color: var(--lp-fg-secondary);\n}\n\n.lp-badge {\n  display: inline-flex; align-items: center; gap: 6px;\n  font-family: var(--font-ui); font-size: 13px; font-weight: 600;\n  padding: 6px 12px; border-radius: 999px;\n  background: rgba(255,255,255,0.08); color: #fff;\n  border: 1px solid rgba(255,255,255,0.16);\n}\n.lp-badge--light {\n  background: var(--lp-bg-sunken); color: var(--lp-fg-primary); border-color: var(--lp-border);\n}\n\n/* Recommended / Featured chip for comparison */\n.lp-chip-recommended {\n  display: inline-flex; align-items: center; gap: 6px;\n  font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;\n  background: var(--sweed-teal); color: #fff;\n  padding: 5px 10px; border-radius: 999px;\n}\n\n/* ==================================================\n   MOLECULES — Media frame (the unified screenshot wrapper)\n   ================================================== */\n.lp-media {\n  position: relative;\n  border-radius: var(--lp-r-media);\n  background: var(--lp-bg-sunken);\n  border: 1px solid var(--lp-border);\n  overflow: hidden;\n  box-shadow: 0 1px 2px rgba(14,21,19,0.04);\n}\n.lp-media--ink {\n  background: var(--lp-bg-ink-2);\n  border-color: rgba(255,255,255,0.08);\n}\n.lp-media--raised {\n  box-shadow: 0 30px 60px -30px rgba(14,21,19,0.35), 0 10px 20px -10px rgba(14,21,19,0.15);\n}\n.lp-media img { display: block; width: 100%; height: auto; }\n\n/* Browser chrome decoration for product screenshots */\n.lp-browser-chrome {\n  display: flex; align-items: center; gap: 8px;\n  padding: 12px 16px;\n  border-bottom: 1px solid var(--lp-border);\n  background: #fff;\n}\n.lp-browser-chrome .dots { display: flex; gap: 6px; }\n.lp-browser-chrome .dots span {\n  width: 10px; height: 10px; border-radius: 50%; background: var(--lp-border-strong);\n}\n.lp-browser-chrome .dots span:nth-child(1) { background: #FF5F57; }\n.lp-browser-chrome .dots span:nth-child(2) { background: #FEBF00; }\n.lp-browser-chrome .dots span:nth-child(3) { background: #28CA41; }\n.lp-browser-chrome .url {\n  flex: 1; text-align: center; font-size: 12px; color: var(--lp-fg-muted);\n  padding: 4px 10px; background: var(--lp-bg-sunken); border-radius: 6px;\n}\n\n/* ==================================================\n   MOLECULES — Card (3 density registers)\n   ================================================== */\n.lp-card {\n  background: #fff;\n  border: 1px solid var(--lp-border);\n  border-radius: var(--lp-r-card);\n  padding: 28px;\n  transition: border-color 200ms, transform 200ms, box-shadow 200ms;\n}\n.lp-card:hover { border-color: var(--lp-border-strong); }\n.lp-card--hero { padding: 40px; border-radius: 20px; }\n.lp-card--small { padding: 20px; border-radius: 14px; }\n.lp-card--ink { background: var(--lp-bg-ink-2); border-color: rgba(255,255,255,0.08); color: #fff; }\n.lp-card--ink h3, .lp-card--ink .lp-h3 { color: #fff; }\n.lp-card--ink p { color: rgba(255,255,255,0.7); }\n\n/* Feature card (Value Map) */\n.lp-feature {\n  display: flex; flex-direction: column; gap: 16px;\n  padding: 28px;\n  background: #fff;\n  border: 1px solid var(--lp-border);\n  border-radius: var(--lp-r-card);\n  transition: border-color 200ms, transform 200ms;\n}\n.lp-feature:hover { border-color: var(--lp-border-strong); transform: translateY(-2px); }\n.lp-feature__icon {\n  width: 48px; height: 48px; border-radius: 12px;\n  display: flex; align-items: center; justify-content: center;\n  background: var(--sweed-teal-50); color: var(--sweed-teal);\n}\n.lp-feature__icon.orange { background: var(--sweed-orange-100); color: var(--sweed-orange-600); }\n.lp-feature__icon.yellow { background: var(--sweed-yellow-100); color: var(--sweed-yellow-600); }\n.lp-feature__icon.cyan   { background: var(--sweed-cyan-100); color: var(--sweed-cyan); }\n.lp-feature__icon.green  { background: var(--sweed-green-100); color: var(--sweed-green-600); }\n.lp-feature__title {\n  font-family: var(--font-display); font-size: 18px; font-weight: 700;\n  color: var(--lp-fg-primary); margin: 0;\n}\n.lp-feature__desc { font-size: 14px; line-height: 1.55; color: var(--lp-fg-secondary); margin: 0; }\n\n/* Step item */\n.lp-step {\n  display: grid; grid-template-columns: 72px 1fr; gap: 20px; align-items: start;\n}\n.lp-step__num {\n  font-family: var(--font-display); font-size: 44px; font-weight: 700;\n  color: var(--sweed-teal); letter-spacing: -0.02em; line-height: 1;\n}\n.lp-step__title { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin: 0 0 8px; }\n.lp-step__desc { font-size: 15px; line-height: 1.55; color: var(--lp-fg-secondary); margin: 0; }\n\n/* Counter / stat block */\n.lp-stat { display: flex; flex-direction: column; gap: 6px; }\n.lp-stat__num {\n  font-family: var(--font-display); font-size: 56px; line-height: 1; font-weight: 700;\n  letter-spacing: -0.03em; color: var(--lp-fg-primary);\n}\n.lp-stat__num .unit { font-size: 32px; color: var(--sweed-teal); margin-left: 2px; }\n.lp-stat__label { font-size: 14px; color: var(--lp-fg-secondary); }\n\n/* Accordion */\n.lp-faq-item {\n  border-bottom: 1px solid var(--lp-border);\n}\n.lp-faq-item summary {\n  list-style: none; cursor: pointer;\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 22px 0; font-family: var(--font-display);\n  font-size: 18px; font-weight: 700; color: var(--lp-fg-primary);\n}\n.lp-faq-item summary::-webkit-details-marker { display: none; }\n.lp-faq-item summary .chev {\n  width: 20px; height: 20px;\n  transition: transform 240ms ease-in-out;\n  color: var(--lp-fg-muted);\n}\n.lp-faq-item[open] summary .chev { transform: rotate(180deg); }\n.lp-faq-item .content {\n  padding: 0 0 22px;\n  color: var(--lp-fg-secondary); font-size: 15px; line-height: 1.6;\n  max-width: 70ch;\n}\n\n/* Customer logo row */\n.lp-logo-row {\n  display: grid; grid-template-columns: repeat(6, 1fr); gap: 32px;\n  align-items: center; justify-items: center;\n}\n.lp-logo-row .lp-logo {\n  font-family: var(--font-display); font-weight: 700;\n  color: var(--lp-fg-muted);\n  font-size: 18px; letter-spacing: -0.02em;\n  opacity: 0.75;\n  transition: opacity 200ms;\n}\n.lp-logo-row .lp-logo:hover { opacity: 1; }\n\n/* ==================================================\n   ORGANISMS — Nav bar\n   ================================================== */\n.lp-nav {\n  position: sticky; top: 0; z-index: 50;\n  background: rgba(250,250,249,0.85);\n  backdrop-filter: blur(12px);\n  -webkit-backdrop-filter: blur(12px);\n  border-bottom: 1px solid var(--lp-border);\n}\n.lp-nav__inner {\n  max-width: var(--lp-container); margin: 0 auto;\n  padding: 16px 32px;\n  display: flex; align-items: center; justify-content: space-between; gap: 32px;\n}\n.lp-nav__logo { height: 28px; display: flex; align-items: center; }\n.lp-nav__logo img { height: 28px; }\n.lp-nav__links { display: flex; gap: 28px; }\n.lp-nav__links a {\n  font-family: var(--font-ui); font-size: 14px; font-weight: 600;\n  color: var(--lp-fg-secondary); text-decoration: none;\n  padding: 6px 0;\n  transition: color 160ms;\n}\n.lp-nav__links a:hover { color: var(--lp-fg-primary); }\n.lp-nav__actions { display: flex; align-items: center; gap: 12px; }\n\n/* Footer */\n.lp-footer { background: var(--lp-bg-ink); color: var(--lp-fg-on-ink); padding: 80px 32px 32px; }\n.lp-footer .lp-container { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 48px; }\n.lp-footer__brand img { height: 28px; filter: brightness(0) invert(1); }\n.lp-footer__brand p { color: var(--lp-fg-on-ink-2); font-size: 14px; margin-top: 16px; max-width: 32ch; }\n.lp-footer__col h5 {\n  font-family: var(--font-ui); font-size: 12px; font-weight: 700;\n  letter-spacing: 0.08em; text-transform: uppercase;\n  color: var(--lp-fg-on-ink-3); margin: 0 0 16px;\n}\n.lp-footer__col a {\n  display: block; font-size: 14px; color: var(--lp-fg-on-ink-2);\n  padding: 6px 0; text-decoration: none; transition: color 160ms;\n}\n.lp-footer__col a:hover { color: #fff; }\n.lp-footer__meta {\n  border-top: 1px solid var(--lp-border-on-ink);\n  margin-top: 64px; padding-top: 24px;\n  display: flex; justify-content: space-between; align-items: center; gap: 16px;\n  color: var(--lp-fg-on-ink-3); font-size: 13px;\n}\n\n/* ==================================================\n   COMING SOON — card anatomy\n   ================================================== */\n.cs-card {\n  display: flex; flex-direction: column;\n  background: #fff;\n  border: 1px solid var(--lp-border);\n  border-radius: var(--lp-r-card);\n  overflow: hidden;\n  transition: border-color 200ms, transform 200ms, box-shadow 200ms;\n}\n.cs-card:hover { border-color: var(--lp-border-strong); }\n\n.cs-card__media {\n  background: var(--lp-bg-sunken);\n  border-bottom: 1px solid var(--lp-border);\n  position: relative;\n  overflow: hidden;\n}\n.cs-card__meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }\n.cs-card__body {\n  padding: 24px;\n  display: flex; flex-direction: column; gap: 16px; flex: 1;\n}\n.cs-card__title {\n  font-family: var(--font-display); font-size: 22px; font-weight: 700;\n  letter-spacing: -0.01em; color: var(--lp-fg-primary); margin: 0;\n}\n.cs-card__desc { font-size: 14px; line-height: 1.55; color: var(--lp-fg-secondary); margin: 0; }\n.cs-card__cta { margin-top: auto; }\n\n/* Hero variant */\n.cs-card--hero .cs-card__body { padding: 36px; gap: 20px; }\n.cs-card--hero .cs-card__title { font-size: 30px; line-height: 1.1; }\n.cs-card--hero .cs-card__desc { font-size: 16px; }\n\n/* Medium (secondary) variant */\n.cs-card--medium .cs-card__body { padding: 28px; }\n.cs-card--medium .cs-card__title { font-size: 22px; }\n\n/* Small variant */\n.cs-card--small .cs-card__body { padding: 22px; gap: 12px; }\n.cs-card--small .cs-card__title { font-size: 18px; }\n.cs-card--small .cs-card__desc { font-size: 13.5px; }\n\n/* Utility */\n.lp-hr { height: 1px; background: var(--lp-border); border: 0; margin: 0; }\n<\u002Fstyle>\n<style>\n  /* ============== Page switcher chrome ============== */\n  body { background: var(--lp-bg-soft); }\n  .page-switcher {\n    position: sticky; top: 0; z-index: 100;\n    background: rgba(255,255,255,0.92);\n    backdrop-filter: saturate(140%) blur(10px);\n    -webkit-backdrop-filter: saturate(140%) blur(10px);\n    border-bottom: 1px solid var(--lp-border);\n  }\n  .page-switcher__inner {\n    max-width: var(--lp-container);\n    margin: 0 auto;\n    padding: 12px 32px;\n    display: flex; align-items: center; gap: 24px;\n  }\n  .ps-brand {\n    display: flex; align-items: center; gap: 10px;\n    font-family: var(--font-display); font-weight: 700; letter-spacing: -0.01em;\n    font-size: 14px; color: var(--lp-fg-primary);\n  }\n  .ps-brand img { height: 22px; width: auto; }\n  .ps-tabs { display: flex; gap: 4px; flex: 1; }\n  .ps-tab {\n    padding: 8px 14px; border-radius: 999px;\n    font-size: 13px; font-weight: 600;\n    color: var(--lp-fg-secondary); cursor: pointer;\n    border: none; background: transparent;\n    font-family: var(--font-ui);\n    transition: all 160ms;\n  }\n  .ps-tab:hover { color: var(--lp-fg-primary); background: var(--lp-bg-sunken); }\n  .ps-tab.active { background: var(--lp-fg-primary); color: #fff; }\n  .ps-tab .num {\n    font-family: var(--font-display);\n    margin-right: 6px; opacity: 0.6; font-size: 11px;\n  }\n  .ps-tab.active .num { opacity: 0.9; }\n  .ps-meta {\n    font-size: 12px; color: var(--lp-fg-muted);\n    display: flex; align-items: center; gap: 6px;\n  }\n  .ps-meta .pill {\n    padding: 3px 8px; border-radius: 999px;\n    background: var(--sweed-teal-50); color: var(--sweed-teal);\n    font-weight: 700; font-size: 11px; letter-spacing: 0.04em;\n  }\n\n  /* ============== Page rooting ============== */\n  .page { display: none; }\n  .page.active { display: block; }\n\n  /* Hide the inner pages' \"back to index\" since we have the switcher */\n  .page .lp-back { display: none !important; }\n\n  /* ============== INDEX page styles ============== */\n  .idx-wrap { max-width: 960px; margin: 0 auto; padding: 80px 32px 96px; }\n  .idx-head { margin-bottom: 64px; max-width: 640px; }\n  .idx-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }\n  .idx-card {\n    display: flex; flex-direction: column; gap: 16px;\n    padding: 28px; background: #fff;\n    border: 1px solid var(--lp-border); border-radius: 20px;\n    text-decoration: none; color: var(--lp-fg-primary);\n    transition: border-color 200ms, transform 200ms, box-shadow 200ms;\n    min-height: 360px;\n    cursor: pointer;\n    font: inherit; text-align: left;\n  }\n  .idx-card:hover { border-color: var(--lp-border-strong); transform: translateY(-3px); box-shadow: 0 24px 48px -24px rgba(14,21,19,0.18); }\n  .idx-card h3 { font-family: var(--font-display); font-size: 24px; font-weight: 700; letter-spacing: -0.01em; margin: 0; }\n  .idx-card p { font-size: 14px; color: var(--lp-fg-secondary); line-height: 1.55; margin: 0; }\n  .idx-thumb { height: 160px; border-radius: 12px; overflow: hidden; position: relative; }\n  .idx-num { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--lp-fg-muted); letter-spacing: 0.06em; }\n  .idx-cta { margin-top: auto; display: inline-flex; align-items: center; gap: 6px; font-weight: 700; color: var(--sweed-teal); font-size: 14px; }\n  .idx-cta svg { transition: transform 200ms; }\n  .idx-card:hover .idx-cta svg { transform: translateX(3px); }\n  @media (max-width: 880px) { .idx-grid { grid-template-columns: 1fr; } }\n\n  /* ============== GET STARTED page styles ============== */\n  .gs-hero {\n    padding: 56px 32px 96px;\n    position: relative; overflow: hidden;\n  }\n  .gs-hero__grid {\n    max-width: var(--lp-container); margin: 0 auto;\n    display: grid; grid-template-columns: 1.1fr 1fr; gap: 56px; align-items: center;\n  }\n  .gs-hero__eyebrow { margin-bottom: 24px; }\n  .gs-hero__title { margin: 0 0 20px; }\n  .gs-hero__lead { margin-bottom: 32px; }\n  .gs-hero__meta { display:flex; gap: 20px; margin-top: 24px; color: var(--lp-fg-muted); font-size: 13px; align-items:center; }\n  .gs-hero__meta .dot { width: 3px; height: 3px; border-radius: 50%; background: currentColor; }\n  .gs-hero__media { position: relative; }\n  .gs-hero__media .float-card {\n    position: absolute; background: #fff; border: 1px solid var(--lp-border);\n    border-radius: 12px; padding: 14px 16px;\n    box-shadow: 0 20px 40px -20px rgba(14,21,19,0.25);\n    display: flex; gap: 12px; align-items: center;\n    font-size: 13px; font-weight: 600;\n  }\n  .gs-hero__media .float-card.fc1 { top: -12px; left: -24px; }\n  .gs-hero__media .float-card.fc2 { bottom: 40px; right: -24px; }\n  .gs-hero__media .float-card .dotlive { width: 10px; height: 10px; border-radius: 50%; background: var(--lp-live); box-shadow: 0 0 0 3px rgba(31,157,85,0.2); }\n  .gs-hero__media .float-card .num { font-family: var(--font-display); color: var(--sweed-teal); }\n\n
